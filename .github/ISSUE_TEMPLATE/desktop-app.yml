name: App Issue
description: Report a bug or request a feature for the Chatto desktop or Android app
labels: ["needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting an issue with the Chatto app! Please fill out the details below.
  - type: dropdown
    id: type
    attributes:
      label: Issue type
      options:
        - Bug
        - Feature request
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Windows
        - Linux
        - Android
        - iOS
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version
      description: "Desktop: Chatto > About Chatto. Android: App Settings."
      placeholder: v0.5.0
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: If reporting a bug, how can we reproduce it?
